<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="app">
    <section class="lotto-card">
      <div class="card-header">
        <p class="eyebrow">Lucky Pick</p>
        <button
          id="themeToggle"
          class="theme-toggle"
          type="button"
          aria-label="다크 모드 전환"
          aria-pressed="false"
        >
          다크 모드
        </button>
      </div>
      <h1>로또 번호 생성기</h1>
      <p class="description">
        1부터 45까지의 숫자 중 중복 없이 6개를 추첨하고 보너스 번호를 함께 보여줍니다.
      </p>

      <div class="numbers-wrap">
        <div>
          <p class="label">당첨 번호</p>
          <div id="numbers" class="numbers" aria-live="polite"></div>
        </div>

        <div>
          <p class="label">보너스</p>
          <div id="bonus" class="bonus" aria-live="polite"></div>
        </div>
      </div>

      <button id="generateButton" class="generate-button" type="button">
        번호 생성하기
      </button>
    </section>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
