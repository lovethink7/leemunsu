<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>저녁 메뉴 추천</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="app">
    <section class="menu-card">
      <div class="card-header">
        <div>
          <p class="eyebrow">Dinner Pick</p>
          <h1>오늘 저녁 뭐 먹지?</h1>
        </div>
        <button
          id="themeToggle"
          class="theme-toggle"
          type="button"
          aria-label="다크 모드 전환"
          aria-pressed="false"
        >
          다크 모드
        </button>
      </div>

      <p class="description">
        고민 끝내고 바로 고를 수 있게, 한 끼 메인 메뉴와 곁들이기 좋은 조합을 추천합니다.
      </p>

      <section class="hero-panel" aria-live="polite">
        <p id="menuCategory" class="hero-kicker"></p>
        <h2 id="menuName" class="hero-title"></h2>
        <p id="menuDescription" class="hero-description"></p>

        <div id="menuTags" class="tag-list"></div>

        <div class="hero-meta">
          <div class="meta-box">
            <p class="label">추천 포인트</p>
            <p id="menuReason" class="meta-value"></p>
          </div>
          <div class="meta-box">
            <p class="label">같이 먹으면 좋은 메뉴</p>
            <p id="menuPairing" class="meta-value"></p>
          </div>
        </div>
      </section>

      <section class="alternatives-section">
        <div class="section-head">
          <p class="label">다른 선택지</p>
          <p class="section-copy">입맛이 바뀌면 아래 후보로 바로 갈아타면 됩니다.</p>
        </div>
        <div id="alternatives" class="alternatives"></div>
      </section>

      <section class="contact-section" aria-labelledby="partnershipTitle">
        <div class="section-head contact-head">
          <div>
            <p class="label">Partnership</p>
            <h2 id="partnershipTitle" class="contact-title">제휴 문의</h2>
          </div>
          <p class="section-copy">브랜드 협업, 광고, 콘텐츠 제휴 문의를 아래 폼으로 받습니다.</p>
        </div>

        <form
          class="contact-form"
          action="https://formspree.io/f/mjgponjo"
          method="POST"
        >
          <div class="form-grid">
            <label class="field">
              <span class="field-label">담당자명</span>
              <input type="text" name="name" placeholder="홍길동" required />
            </label>

            <label class="field">
              <span class="field-label">이메일</span>
              <input type="email" name="email" placeholder="contact@company.com" required />
            </label>

            <label class="field">
              <span class="field-label">회사명</span>
              <input type="text" name="company" placeholder="회사 또는 브랜드명" />
            </label>

            <label class="field">
              <span class="field-label">문의 유형</span>
              <select name="inquiryType" required>
                <option value="">선택해주세요</option>
                <option value="brand-collab">브랜드 협업</option>
                <option value="advertising">광고 제안</option>
                <option value="content-partnership">콘텐츠 제휴</option>
                <option value="other">기타</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span class="field-label">문의 내용</span>
            <textarea
              name="message"
              rows="6"
              placeholder="제휴 목적, 예상 일정, 희망 진행 방식 등을 적어주세요."
              required
            ></textarea>
          </label>

          <input type="hidden" name="_subject" value="새 제휴 문의가 도착했습니다" />

          <button class="submit-button" type="submit">제휴 문의 보내기</button>
        </form>
      </section>

      <section class="comments-section" aria-labelledby="commentsTitle">
        <div class="section-head comments-head">
          <div>
            <p class="label">Community</p>
            <h2 id="commentsTitle" class="contact-title">댓글</h2>
          </div>
          <p class="section-copy">추천 메뉴에 대한 의견이나 후기, 다른 메뉴 아이디어를 남겨보세요.</p>
        </div>

        <div id="disqus_thread"></div>
        <script>
          var disqus_config = function () {
            this.page.url = 'https://leemunsu1.pages.dev/';
            this.page.identifier = 'dinner-menu-home';
          };

          (function () {
            var d = document;
            var s = d.createElement('script');
            s.src = 'https://leemunsu1-pages-dev.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
          })();
        </script>
        <noscript>
          Please enable JavaScript to view the
          <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a>
        </noscript>
      </section>

      <button id="recommendButton" class="recommend-button" type="button">
        저녁 메뉴 다시 추천받기
      </button>
    </section>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
