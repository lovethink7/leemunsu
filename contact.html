<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의 | RPS AI Lab</title>
  <meta name="description" content="RPS AI Lab에 대한 제휴, 오류 제보, 콘텐츠 문의를 보낼 수 있는 연락 페이지입니다." />
  <meta name="google-adsense-account" content="ca-pub-5489177204055109" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3RGTJP9J47"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-3RGTJP9J47');
  </script>
  <link rel="canonical" href="https://leemunsu1.pages.dev/contact.html" />
  <link href="/style.css" rel="stylesheet" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5489177204055109" crossorigin="anonymous"></script>
  <script defer src="/main.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-block">
        <a class="brand" href="/">RPS AI Lab</a>
        <p class="brand-note">가위바위보 손 모양 인식 실험실</p>
      </div>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a class="nav-link" href="/">홈</a>
        <a class="nav-link" href="/about.html">소개</a>
        <a class="nav-link" href="/privacy.html">개인정보처리방침</a>
        <a class="nav-link is-current" href="/contact.html">문의</a>
      </nav>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="다크 모드 전환" aria-pressed="false">다크 모드</button>
    </header>

    <main class="site-main simple-main">
      <section class="hero hero-simple">
        <div class="hero-copy">
          <p class="eyebrow">Contact</p>
          <h1>문의 및 제보</h1>
          <p class="lead">모델 오인식 사례, 페이지 오류, 제휴 문의, 콘텐츠 제안은 아래 양식으로 받을 수 있습니다.</p>
        </div>
      </section>

      <section class="section-block card-panel">
        <div class="section-head">
          <div>
            <p class="label">Contact Form</p>
            <h2 class="section-title">연락 양식</h2>
          </div>
          <p class="section-copy">실제 회신이 필요한 문의는 이메일 주소를 정확히 입력해 주세요.</p>
        </div>

        <form class="contact-form" action="https://formspree.io/f/mjgponjo" method="POST">
          <div class="form-grid">
            <label class="field">
              <span class="field-label">이름</span>
              <input type="text" name="name" placeholder="홍길동" required />
            </label>
            <label class="field">
              <span class="field-label">이메일</span>
              <input type="email" name="email" placeholder="name@example.com" required />
            </label>
            <label class="field">
              <span class="field-label">문의 유형</span>
              <select name="inquiryType" required>
                <option value="">선택해주세요</option>
                <option value="error-report">오류 제보</option>
                <option value="model-feedback">모델 피드백</option>
                <option value="partnership">제휴 문의</option>
                <option value="other">기타</option>
              </select>
            </label>
            <label class="field">
              <span class="field-label">관련 페이지</span>
              <input type="text" name="relatedPage" placeholder="예: 홈, 소개, 개인정보처리방침" />
            </label>
          </div>

          <label class="field">
            <span class="field-label">문의 내용</span>
            <textarea name="message" rows="7" placeholder="발생한 문제나 문의 내용을 자세히 적어주세요." required></textarea>
          </label>

          <input type="hidden" name="_subject" value="RPS AI Lab 문의가 도착했습니다" />
          <button class="primary-button form-submit" type="submit">문의 보내기</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>RPS AI Lab</strong>
        <p>직접 학습한 이미지 모델을 테스트하고 사용 팁을 기록하는 실험형 정보 사이트입니다.</p>
      </div>
      <div class="footer-links">
        <a href="/">홈</a>
        <a href="/about.html">소개</a>
        <a href="/privacy.html">개인정보처리방침</a>
      </div>
    </footer>
  </div>
</body>
</html>
